<section class="doctor-edit">
  <h1 class="doctor-edit__title">Edit Doctor</h1>

  @if (doctor(); as doctorValue) {
    <mat-card appearance="outlined">
      <mat-card-content>
        <app-doctor-form
          [doctor]="doctorValue"
          submitLabel="Save Changes"
          [isSaving]="isSaving()"
          (save)="update($event)"
          (cancelled)="cancel()"
        />
      </mat-card-content>
    </mat-card>
  } @else {
    <div class="doctor-edit__loading">
      <mat-spinner diameter="32" />
    </div>
  }
</section>
