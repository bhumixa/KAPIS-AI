<section class="clinic-holidays">
  <div class="clinic-holidays__header">
    <h1 class="clinic-holidays__title">Clinic Holidays</h1>
    <button mat-flat-button color="primary" (click)="addHoliday()">
      <mat-icon>add</mat-icon>
      <span>Add Holiday</span>
    </button>
  </div>

  <app-schedule-nav />

  @if (holidays().length > 0) {
    <table mat-table [dataSource]="holidays()" class="clinic-holidays__table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Holiday Name</th>
        <td mat-cell *matCellDef="let holiday">{{ holiday.name }}</td>
      </ng-container>

      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let holiday">{{ holiday.date }}</td>
      </ng-container>

      <ng-container matColumnDef="recurring">
        <th mat-header-cell *matHeaderCellDef>Recurring</th>
        <td mat-cell *matCellDef="let holiday">
          <mat-chip>{{ holiday.recurringYearly ? 'Every Year' : 'One-time' }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let holiday">
          <button mat-icon-button matTooltip="Edit" (click)="editHoliday(holiday)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Delete" (click)="deleteHoliday(holiday)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  } @else {
    <div class="clinic-holidays__empty">
      <mat-icon class="clinic-holidays__empty-icon">event_busy</mat-icon>
      <p>No holidays added yet.</p>
      <button mat-flat-button color="primary" (click)="addHoliday()">
        <mat-icon>add</mat-icon>
        <span>Add Holiday</span>
      </button>
    </div>
  }
</section>
