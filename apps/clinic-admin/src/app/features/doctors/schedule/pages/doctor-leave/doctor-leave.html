<section class="doctor-leave">
  <div class="doctor-leave__header">
    <h1 class="doctor-leave__title">Doctor Leave</h1>
    <button mat-flat-button color="primary" (click)="addLeave()">
      <mat-icon>add</mat-icon>
      <span>Add Leave</span>
    </button>
  </div>

  <app-schedule-nav />

  @if (rows().length > 0) {
    <table mat-table [dataSource]="rows()" class="doctor-leave__table">
      <ng-container matColumnDef="doctor">
        <th mat-header-cell *matHeaderCellDef>Doctor</th>
        <td mat-cell *matCellDef="let row">{{ row.doctorName }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Leave Type</th>
        <td mat-cell *matCellDef="let row">
          <mat-chip>{{ row.typeLabel }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef>Start Date</th>
        <td mat-cell *matCellDef="let row">{{ row.startDate }}</td>
      </ng-container>

      <ng-container matColumnDef="endDate">
        <th mat-header-cell *matHeaderCellDef>End Date</th>
        <td mat-cell *matCellDef="let row">{{ row.endDate }}</td>
      </ng-container>

      <ng-container matColumnDef="reason">
        <th mat-header-cell *matHeaderCellDef>Reason</th>
        <td mat-cell *matCellDef="let row">{{ row.reason }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button matTooltip="Edit" (click)="editLeave(row)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Delete" (click)="deleteLeave(row)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  } @else {
    <div class="doctor-leave__empty">
      <mat-icon class="doctor-leave__empty-icon">event_busy</mat-icon>
      <p>No leave records yet.</p>
      <button mat-flat-button color="primary" (click)="addLeave()">
        <mat-icon>add</mat-icon>
        <span>Add Leave</span>
      </button>
    </div>
  }
</section>
