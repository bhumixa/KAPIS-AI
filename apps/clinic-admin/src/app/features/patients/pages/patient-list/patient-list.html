<section class="patient-list">
  <div class="patient-list__header">
    <h1 class="patient-list__title">Patients</h1>
    <button mat-flat-button color="primary" [routerLink]="[patientsPath, 'add']">
      <mat-icon>add</mat-icon>
      <span>Add Patient</span>
    </button>
  </div>

  @if (hasPatients()) {
    <div class="patient-list__filters">
      <mat-form-field appearance="outline" class="patient-list__search">
        <mat-label>Search</mat-label>
        <input
          matInput
          placeholder="Search by name, mobile, or email"
          [value]="searchTerm()"
          (input)="onSearchInput($event)"
        />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="patient-list__status">
        <mat-label>Status</mat-label>
        <mat-select [value]="statusFilter()" (selectionChange)="onStatusFilterChange($event)">
          <mat-option value="all">All</mat-option>
          <mat-option value="active">Active</mat-option>
          <mat-option value="inactive">Inactive</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <app-patient-table
      [patients]="filteredPatients()"
      (view)="viewPatient($event)"
      (edit)="editPatient($event)"
      (delete)="deletePatient($event)"
    />
  } @else {
    <div class="patient-list__empty">
      <mat-icon class="patient-list__empty-icon">groups</mat-icon>
      <p>No patients added yet.</p>
      <button mat-flat-button color="primary" [routerLink]="[patientsPath, 'add']">
        <mat-icon>add</mat-icon>
        <span>Add Patient</span>
      </button>
    </div>
  }
</section>
