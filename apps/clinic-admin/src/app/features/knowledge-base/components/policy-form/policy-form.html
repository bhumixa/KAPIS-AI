<h2 mat-dialog-title>{{ data.policy ? 'Edit Policy' : 'Add Policy' }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="policy-form">
    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" required />
      @if (form.controls.title.hasError('required')) {
        <mat-error>Title is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type" required>
        @for (type of types; track type) {
          <mat-option [value]="type">{{ type }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="policy-form__wide">
      <mat-label>Content</mat-label>
      <textarea matInput formControlName="content" rows="5" required></textarea>
      @if (form.controls.content.hasError('required')) {
        <mat-error>Content is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status" required>
        <mat-option value="active">Active</mat-option>
        <mat-option value="inactive">Inactive</mat-option>
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-stroked-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit">
      {{ data.policy ? 'Save Changes' : 'Add Policy' }}
    </button>
  </mat-dialog-actions>
</form>
