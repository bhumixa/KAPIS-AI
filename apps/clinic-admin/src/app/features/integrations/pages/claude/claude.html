<section class="claude">
  <h1 class="claude__title">Integrations</h1>

  <app-integrations-nav />

  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title class="claude__card-title">
        <span>Gemini AI</span>
        <app-integration-status-chip [status]="status().status" />
      </mat-card-title>
      <mat-card-subtitle
        >Placeholder only - no Gemini API calls are made yet. The API key is configured via
        server environment variables and is not editable here.</mat-card-subtitle
      >
    </mat-card-header>
    <mat-card-content>
      <form class="claude__form" [formGroup]="form" (ngSubmit)="submit()">
        <mat-slide-toggle formControlName="enabled">Enabled</mat-slide-toggle>

        <div class="claude__grid">
          <mat-form-field appearance="outline">
            <mat-label>Model</mat-label>
            <input matInput formControlName="model" required />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Max Tokens</mat-label>
            <input matInput type="number" formControlName="maxTokens" required />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Temperature (0-1)</mat-label>
            <input
              matInput
              type="number"
              step="0.1"
              min="0"
              max="1"
              formControlName="temperature"
              required
            />
          </mat-form-field>
        </div>

        <div class="claude__actions">
          <button
            mat-stroked-button
            type="button"
            [disabled]="isTesting()"
            (click)="testConnection()"
          >
            @if (isTesting()) {
              <mat-spinner diameter="20" />
            } @else {
              <span>Test Connection</span>
            }
          </button>
          <button mat-flat-button color="primary" type="submit" [disabled]="isSaving()">
            @if (isSaving()) {
              <mat-spinner diameter="20" />
            } @else {
              <span>Save Gemini Integration</span>
            }
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</section>
