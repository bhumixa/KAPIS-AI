<section class="whatsapp">
  <h1 class="whatsapp__title">Integrations</h1>

  <app-integrations-nav />

  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title class="whatsapp__card-title">
        <span>WhatsApp</span>
        <app-integration-status-chip [status]="status().status" />
      </mat-card-title>
      <mat-card-subtitle
        >Placeholder only - no Meta WhatsApp Cloud API calls are made yet. Access/verify tokens
        are configured via server environment variables and are not editable here.</mat-card-subtitle
      >
    </mat-card-header>
    <mat-card-content>
      <form class="whatsapp__form" [formGroup]="form" (ngSubmit)="submit()">
        <div class="whatsapp__grid">
          <mat-form-field appearance="outline">
            <mat-label>Business Number</mat-label>
            <input matInput formControlName="businessNumber" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Phone Number ID</mat-label>
            <input matInput formControlName="phoneNumberId" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>WABA ID</mat-label>
            <input matInput formControlName="wabaId" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="whatsapp__wide">
            <mat-label>Webhook URL</mat-label>
            <input matInput formControlName="webhookUrl" placeholder="https://" />
          </mat-form-field>
        </div>

        <div class="whatsapp__actions">
          <button
            mat-stroked-button
            type="button"
            [disabled]="isTesting()"
            (click)="testConnection()"
          >
            @if (isTesting()) {
              <mat-spinner diameter="20" />
            } @else {
              <span>Test Connection</span>
            }
          </button>
          <button mat-flat-button color="primary" type="submit" [disabled]="isSaving()">
            @if (isSaving()) {
              <mat-spinner diameter="20" />
            } @else {
              <span>Save WhatsApp Integration</span>
            }
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</section>
