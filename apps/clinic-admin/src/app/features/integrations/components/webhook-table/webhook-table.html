<div class="webhook-table__wrapper">
  <table mat-table [dataSource]="dataSource" matSort class="webhook-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let webhook">{{ webhook.name }}</td>
    </ng-container>

    <ng-container matColumnDef="url">
      <th mat-header-cell *matHeaderCellDef>URL</th>
      <td mat-cell *matCellDef="let webhook">{{ webhook.url }}</td>
    </ng-container>

    <ng-container matColumnDef="events">
      <th mat-header-cell *matHeaderCellDef>Events</th>
      <td mat-cell *matCellDef="let webhook" [matTooltip]="eventsTooltip(webhook)">
        {{ webhook.events.length }} event{{ webhook.events.length === 1 ? '' : 's' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
      <td mat-cell *matCellDef="let webhook">
        <mat-chip
          class="webhook-table__status"
          [class.webhook-table__status--inactive]="webhook.status === 'inactive'"
        >
          {{ webhook.status | titlecase }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let webhook">
        <button mat-icon-button matTooltip="Edit" (click)="edit.emit(webhook)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Delete" (click)="delete.emit(webhook)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <tr class="webhook-table__no-data-row" *matNoDataRow>
      <td class="webhook-table__no-data" [attr.colspan]="displayedColumns.length">
        No webhooks configured.
      </td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 25]" [pageSize]="10" showFirstLastButtons />
</div>
