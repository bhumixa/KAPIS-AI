<section class="ai-settings">
  <h1 class="ai-settings__title">Settings</h1>

  <app-settings-nav />

  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>AI Settings</mat-card-title>
      <mat-card-subtitle
        >Placeholder only - no API calls are made yet. Fields are stored for the future AI
        module.</mat-card-subtitle
      >
    </mat-card-header>
    <mat-card-content>
      <form class="ai-settings__form" [formGroup]="form" (ngSubmit)="submit()">
        <mat-slide-toggle formControlName="enabled">AI Enabled</mat-slide-toggle>

        <div class="ai-settings__grid">
          <mat-form-field appearance="outline">
            <mat-label>AI Provider</mat-label>
            <mat-select formControlName="provider" required>
              @for (provider of providers; track provider) {
                <mat-option [value]="provider">{{ provider }}</mat-option>
              }
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Default Model</mat-label>
            <input matInput formControlName="defaultModel" required />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Gemini API Key</mat-label>
            <input matInput type="password" formControlName="claudeApiKey" autocomplete="off" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>OpenAI API Key</mat-label>
            <input matInput type="password" formControlName="openaiApiKey" autocomplete="off" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Temperature (0-1)</mat-label>
            <input
              matInput
              type="number"
              step="0.1"
              min="0"
              max="1"
              formControlName="temperature"
              required
            />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Max Tokens</mat-label>
            <input matInput type="number" formControlName="maxTokens" required />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="ai-settings__wide">
          <mat-label>System Prompt</mat-label>
          <textarea matInput formControlName="systemPrompt" rows="4"></textarea>
        </mat-form-field>

        <div class="ai-settings__actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="isSaving()">
            @if (isSaving()) {
              <mat-spinner diameter="20" />
            } @else {
              <span>Save AI Settings</span>
            }
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</section>
